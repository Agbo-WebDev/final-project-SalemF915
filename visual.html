<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <title>Page Title</title>
</head>

<div id="authSection" class="container" style="margin-top: 20px;">
  <div class="row">
    <div class="col-md-6">
      <h3>Login</h3>
        <input type="text" id="loginUsername" placeholder="Username" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button id="loginBtn" onclick="login_user()" >Login</button>
    </div>
    <div class="col-md-6">
      <h3>Register</h3>
        <input type="text" id="regUsername" placeholder="Username" required>
        <input type="password" id="regPassword" placeholder="Password" required>
        <button id="registerBtn" onclick="create_user()" >Register</button>
    </div>
    <div class="col-md-6">
        <button id = "logoutBtn" onclick="logout()">Logout</button>
    </div>
  </div>
</div>



<body>

    <!-- Visible content goes here -->
    <h1>Music Organizing</h1>

    <div class="jumbotron text-center">
    <h1>Import Json Files from BeepBox!</h1>
    <p>Import a JSON file and watch it get automactially get sorted!</p> 
    </div>

    <p>upload files here</p>

    <input id = "upload1" type="file" >​


    <div class = buttons>
    <button id="inserBtn" onclick="insert()">Insert file</button>

    <button id="Backup files" onclick="backup()">Backup Files</button>

    </div>

    <div class = "container" style="background-color: darkblue;">
        <div class="buttons"> 
            <button id="createBtn" onclick="createproject()">Create Project</button>
        </div>
    <input id="project_name" type="file" style="width: 10%; height: 20%;" >

    
    </div>



    <div>
    <table class = "table table-dark">
    <thead>
        <tr>
        <th scope="col">#</th>
        <th scope="col">Project Name</th>
        <th scope="col">Members in Family</th>
        </tr>
    </thead>
    <tbody id="projectTableBody">
        <!-- Project rows will be dynamically added here -->
    </tbody>
    </div>

    <div>
        <h1>View Project Family</h1>
        <div class="dropdown">
            <button type="button" onclick="dropdown_update()" class="btn btn-primary dropdown-toggle" data-toggle="dropdown">
                Dropdown button
            </button>
        <div class="dropdown-menu" style="width: 50%;">

        </div>
        </div>

        <table class="table table-dark" id="family_table">
            <thead>
                <tr>
                    <th scope="col">Project Name</th>
                    <th scope="col">Date Added</th>
                    <th scope="col">Priority</th>
                    <th scope="col">Download JSON</th>
                </tr>

            </thead>
            <tbody id="familyTableBody">
                <!-- Project rows will be dynamically added here -->
            </tbody>

        </table>



    </div>


    <script src="jscode.js"></script>
</body>
</html>
